<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title data-i18n="popupTitle"></title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 12px; width: 280px; }
    .row { margin-bottom: 12px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
    .hint { color: #666; font-size: 12px; margin-top: 4px; }
    .toggle { display: flex; align-items: center; gap: 8px; }
    button { padding: 6px 10px; }
    .status { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="row">
    <label data-i18n="labelHotkey"></label>
    <input id="hotkeyInput" type="text" data-i18n-placeholder="hotkeyPlaceholder" readonly />
    <div class="hint" data-i18n="hotkeyHint"></div>
    <div style="margin-top:8px;">
      <button id="resetBtn" data-i18n="btnReset"></button>
    </div>
  </div>

  <div class="row">
    <label data-i18n="labelAutoSkip"></label>
    <div class="toggle">
      <input id="autoSkipToggle" type="checkbox" />
      <span id="autoSkipStatus" class="status"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
